  // Base64 to ArrayBuffer Helper for raw signed PCM16 audio
  const base64ToArrayBuffer = (base64) => {
    const binaryString = window.atob(base64);
    const len = binaryString.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) {
      bytes[i] = binaryString.charCodeAt(i);
    }
    return bytes.buffer;
  };

  // Convert raw signed PCM16 audio samples to a standard WAV Container
  const pcmToWav = (pcm16Data, sampleRate) => {
    const buffer = new ArrayBuffer(44 + pcm16Data.length * 2);
    const view = new DataView(buffer);

    const writeString = (view, offset, string) => {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    };

    writeString(view, 0, 'RIFF');
    view.setUint32(4, 36 + pcm16Data.length * 2, true);
    writeString(view, 8, 'WAVE');
    writeString(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true); // Raw signed PCM
    view.setUint16(22, 1, true); // Mono
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true); // Byte rate
    view.setUint16(32, 2, true); // Block align
    view.setUint16(34, 16, true); // Bits per sample
    writeString(view, 36, 'data');
    view.setUint32(40, pcm16Data.length * 2, true);

    let index = 44;
    for (let i = 0; i < pcm16Data.length; i++) {
      view.setInt16(index, pcm16Data[i], true);
      index += 2;
    }

    return new Blob([view], { type: 'audio/wav' });
  };

    const cleanText = textToSpeak.replace(/[#*`\-]/g, ' ');
    const thaiSpeechPrompt = `Say loudly and clearly in Thai language as a professional military commander: ${cleanText.substring(0, 500)}`;

    const payload = {
      contents: [{
        parts: [{ text: thaiSpeechPrompt }]
      }],
      generationConfig: {
        responseModalities: ["AUDIO"],
        speechConfig: {
          voiceConfig: {
            prebuiltVoiceConfig: { voiceName: "Zephyr" } // Bright and clear tone
          }
        }
      }
    };

    const apiKey = getApiKey();
    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;

    try {
      const response = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error("TTS request failed");
      
      const result = await response.json();
      const part = result?.candidates?.[0]?.content?.parts?.[0];
      const audioData = part?.inlineData?.data;
      const mimeType = part?.inlineData?.mimeType;

      if (audioData && mimeType && mimeType.startsWith("audio/")) {
        const match = mimeType.match(/rate=(\d+)/);
        const sampleRate = match ? parseInt(match[1], 10) : 24000;
        
        const pcmData = base64ToArrayBuffer(audioData);
        const pcm16 = new Int16Array(pcmData);
        const wavBlob = pcmToWav(pcm16, sampleRate);
        
        if (audioUrl) {
          URL.revokeObjectURL(audioUrl);
        }
        
        const newUrl = URL.createObjectURL(wavBlob);
        setAudioUrl(newUrl);

                            placeholder="พิกัดจุดตรวจความมั่นคง บ้านเนินเขา ต.ช่องเม็ก"
                            className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs focus:border-blue-500 focus:outline-none"
                          />
                        </div>

                        <div>
                          <label className="text-[10px] text-slate-400 block mb-1">ลักษณะเด่นและเครื่องแต่งกายในภาพถ่ายสำรอง</label>
                          <textarea 
                            rows="2"
                            value={pt1Form.photoPlaceholderDesc}
                            onChange={(e) => setPt1Form({...pt1Form, photoPlaceholderDesc: e.target.value})}
                            placeholder="สวมเสื้อแจ็กเก็ตยีนส์สีฟ้า กางเกงขาสามส่วนสีดำ มีรอยสักรูปดาวที่แขนขวาด้านนอก"
                            className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs focus:border-blue-500 focus:outline-none resize-none"
                          />
                        </div>

                        <div>
                          <label className="text-[10px] text-slate-400 block mb-1">เหตุสุดวิสัยกรณีกล้องขัดข้อง / ปัญหาภาพถ่าย (ถ้ามี)</label>
                          <textarea 
                            rows="2"
                            value={pt1Form.forceMejureExplanation}
                            onChange={(e) => setPt1Form({...pt1Form, forceMejureExplanation: e.target.value})}
                            placeholder="กล้องขัดข้องเนื่องจากสภาพอากาศฝนตกหนัก มีน้ำซึมเข้าพอร์ตเชื่อมต่อ จึงใช้วิธีวิทยุรายงานศปก. เป็นหลักฐานสำรอง"
                            className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs focus:border-blue-500 focus:outline-none resize-none"
                          />
                        </div>

                        <button
                          type="submit"
                          className="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-xs font-bold transition-all shadow-lg flex items-center justify-center gap-1.5"
                        >
                          <Download className="w-4 h-4" />
                          บันทึกและตรวจสอบรายงาน ปท.1
                        </button>
                      </form>
                    ) : (
                      <div className="space-y-4 animate-scaleUp">
                        {/* Beautiful export confirmation card view */}
                        <div className="bg-slate-950 border border-emerald-500/30 rounded-xl p-4 relative overflow-hidden">
                          {/* Watermark badge */}
                          <div className="absolute top-2 right-2 px-2 py-0.5 bg-emerald-950 text-emerald-400 border border-emerald-500/30 text-[9px] font-mono rounded font-bold uppercase tracking-widest">
                            SECURE REPORT LOCKED
                          </div>

                          <div className="flex items-center gap-2 mb-3 pb-2 border-b border-slate-800/80">
                            <CheckSquare className="w-5 h-5 text-emerald-400" />
                            <div>
                              <h4 className="font-bold text-xs text-slate-200">บันทึกข้อมูล ปท.1 สำเร็จ</h4>
                              <p className="text-[9px] text-slate-400">TIMESTAMP: {new Date().toLocaleTimeString('th-TH')}</p>
                            </div>
                          </div>

                          <div className="space-y-2 text-[11px] text-slate-300">
                            <div>
                              <strong className="text-slate-400">ผู้รายงาน:</strong> {pt1Form.officerRank} {pt1Form.officerName}
                            </div>
                            <div>
                              <strong className="text-slate-400">ผู้ถูกควบคุมตัว:</strong> {pt1Form.detaineeName} (อายุ {pt1Form.detaineeAge} ปี)
                            </div>
                            <div>
                              <strong className="text-slate-400">เลขประจำตัว:</strong> {pt1Form.detaineeID}
                            </div>
                            <div>
                              <strong className="text-slate-400">สถานที่:</strong> {pt1Form.location}
                            </div>
                            {pt1Form.photoPlaceholderDesc && (
                              <div>
                                <strong className="text-slate-400">พรรณนาภาพถ่าย:</strong> {pt1Form.photoPlaceholderDesc}
                              </div>
                            )}
                            {pt1Form.forceMejureExplanation && (
                              <div className="bg-amber-950/20 p-2 rounded border border-amber-800/30 mt-2 text-amber-300">
                                <strong>⚠️ เหตุสุดวิสัยบันทึกภาพ/เสียง:</strong> {pt1Form.forceMejureExplanation}
                              </div>
                            )}
                          </div>
                        </div>

                        {/* Integrated AI Auditor Panel */}
                        <div className="bg-slate-950 border border-purple-500/30 rounded-xl p-3 space-y-2.5">
                          <div className="flex items-center justify-between">
                            <div className="flex items-center gap-1.5 text-xs font-bold text-purple-300">
                              <Scale className="w-4 h-4 text-purple-400" />
                              <span>อัยการวิเคราะห์สุ่มเสี่ยงกฎหมาย (Gemini)</span>
                            </div>
                            
                            <button
                              onClick={auditPt1Form}
                              disabled={isAuditing}
                              className="px-2.5 py-1 bg-purple-600/20 text-purple-300 border border-purple-500/30 hover:bg-purple-600/40 text-[10px] font-bold rounded-lg transition-all flex items-center gap-1"
                            >
                              {isAuditing ? (
                                <Loader2 className="w-3 h-3 animate-spin" />
                              ) : (
                                <FileCheck className="w-3 h-3" />
                              )}
                              ตรวจสอบประวัติ
                            </button>
                          </div>

                          {auditError && (
                            <div className="p-2.5 bg-red-950/40 border border-red-500/30 rounded-lg text-red-300 text-[11px]">
                              {auditError}
                            </div>
                          )}

                          {auditResult && (
                            <div className="bg-slate-900/60 p-3 rounded-lg border border-slate-800 text-[11px] leading-relaxed max-h-[250px] overflow-y-auto pr-1">
                              {renderAIResponse(auditResult)}
                            </div>
                          )}
                        </div>

                        <div className="flex gap-2">
                          <button
                            onClick={handlePt1Reset}
                            className="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 rounded-lg text-xs font-bold transition-all"
                          >
                            แก้ไขเอกสารใหม่
                          </button>
                          <button
                            onClick={() => {
                              showToast("ส่งไฟล์ ปท.1 และรายงานพฤติการณ์ไปยังศูนย์รับแจ้งความมั่นคงอำเภอเรียบร้อย", "success");
                            }}
                            className="flex-1 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-xs font-bold transition-all"
                          >
                            นำออกเอกสาร (PDF)
                          </button>
                        </div>
                      </div>
                    )}
                  </section>

                </div>
              )}

            </div>
          )}

          {/* TAB 6: GAMIFIED CHALLENGE QUIZ GAME (VS DAB LAEM) */}
          {activeTab === 'quiz' && (
            <div className="space-y-4 animate-fadeIn">
              
              {!quizStarted && quizPhase === 'idle' && (
                <section className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/60 shadow-lg text-center space-y-4">
                  <div className="p-3 bg-blue-900/20 rounded-2xl w-fit mx-auto border border-blue-500/30">
                    <Award className="w-10 h-10 text-blue-400" />
                  </div>
                  
                  <div>
                    <h3 className="font-bold text-base text-slate-100">ดวลยุทธวิธีสู้ 'ดาบแหลม' (AI)</h3>
                    <p className="text-xs text-slate-400 leading-relaxed mt-1">
                      ทดสอบปฏิภาณความปลอดภัยและข้อกฎหมาย 20 ข้อเพื่อชิงความเป็นหนึ่งในสนามรบเชิงกลยุทธ์
                    </p>
                  </div>

                  {/* Rules overview */}
                  <div className="bg-slate-950/60 p-3 rounded-lg border border-slate-800/80 text-left space-y-1.5 text-xs">
                    <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider block">กติกาสงครามสมอง:</span>
                    <div className="flex items-center gap-2 text-slate-300 text-[11px]">
                      <span className="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                      <span>มีคำถาม 20 ข้อ จับเวลาวิเคราะห์ 10 วินาทีต่อข้อ</span>
                    </div>
                    <div className="flex items-center gap-2 text-slate-300 text-[11px]">
                      <span className="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                      <span>หากตอบผิดหรือปล่อยให้เวลาหมด ดาบแหลมจะฟันแต้มทิ้งทันที</span>
                    </div>
                    <div className="flex items-center gap-2 text-slate-300 text-[11px]">
                      <span className="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                      <span>ผู้ที่สะสมคะแนนได้สูงสุดหลังจบรอบจะเป็นผู้ชนะ</span>
                    </div>
                  </div>

                  <form onSubmit={handleStartQuiz} className="space-y-3">
                    <div>
                      <label className="text-[10px] text-slate-400 block text-left mb-1">กรอกชื่อของคุณ</label>
                      <input 
                        type="text" 
                        required
                        value={quizPlayerName}
                        onChange={(e) => setQuizPlayerName(e.target.value)}
                        placeholder="จ.ส.ต. สมชาย"
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-xs text-center focus:border-blue-500 focus:outline-none"
                      />
                    </div>
                    <div>
                      <label className="text-[10px] text-slate-400 block text-left mb-1">สังกัด / กองร้อย</label>
                      <input 
                        type="text" 
                        value={quizPlayerRank}
                        onChange={(e) => setQuizPlayerRank(e.target.value)}
                        placeholder="กองร้อย ตชด.224"
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-xs text-center focus:border-blue-500 focus:outline-none"
                      />
                    </div>

                    <button
                      type="submit"
                      className="w-full py-3 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white rounded-xl text-xs font-black transition-all shadow-lg uppercase tracking-wider"
                    >
                      เริ่มสงครามตอบคำถามยุทธวิธี
                    </button>
                  </form>
                </section>
              )}

              {/* Quiz Gameplay Screen */}
              {quizStarted && (quizPhase === 'playing' || quizPhase === 'reveal') && (
                <div className="space-y-4">
                  
                  {/* Split Screen VS Scoreboard */}
                  <div className="grid grid-cols-2 gap-2 bg-slate-950 border border-slate-800 rounded-xl p-3">
                    
                    {/* Player Card */}
                    <div className="flex flex-col items-center justify-center border-r border-slate-800/80 pr-2 py-1">
                      <div className="w-8 h-8 rounded-full bg-blue-600/20 text-blue-400 flex items-center justify-center font-bold text-xs mb-1">
                        🧑
                      </div>
                      <span className="text-[11px] font-bold text-slate-200 truncate max-w-[120px]">{quizPlayerName}</span>
                      <span className="text-[9px] text-slate-400 truncate max-w-[120px]">{quizPlayerRank || 'ตชด. ผู้ท้าชิง'}</span>
                      <div className="text-xl font-black text-blue-400 mt-1 font-mono">{playerScore}</div>
                    </div>

                    {/* AI Opponent: Dab Laem */}
                    <div className="flex flex-col items-center justify-center pl-2 py-1">
                      <div className="w-8 h-8 rounded-full bg-purple-600/20 text-purple-400 flex items-center justify-center font-bold text-xs mb-1">
                        🤖
                      </div>
                      <span className="text-[11px] font-bold text-slate-200">ดาบแหลม (AI)</span>
                      <span className="text-[9px] text-purple-400 uppercase tracking-widest font-mono">Tactical Bot</span>
                      <div className="text-xl font-black text-purple-400 mt-1 font-mono">{aiScore}</div>
                    </div>

                  </div>

                  {/* Visual Timer Bar */}
                  <div className="bg-slate-950 border border-slate-800 rounded-lg p-2 flex items-center justify-between">
                    <div className="flex items-center gap-1.5">
                      <Clock className="w-4 h-4 text-amber-500" />
                      <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        เวลาในการตัดสินใจ:
                      </span>
                    </div>
                    <div className="flex items-center gap-3">
                      <div className="w-24 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                        <div 
                          className={`h-full transition-all duration-1000 ${
                            quizTimer <= 3 ? 'bg-red-500' : 'bg-blue-500'
                          }`}
                          style={{ width: `${(quizTimer / 10) * 100}%` }}
                        ></div>
                      </div>
                      <span className="text-xs font-mono font-bold text-slate-200">{quizTimer}s</span>
                    </div>
                  </div>

                  {/* Question Card */}
                  <section className="bg-slate-800/40 border border-slate-700/60 rounded-xl p-4 shadow-lg space-y-4">
                    <div className="flex justify-between items-center text-[10px] text-slate-400 uppercase font-mono tracking-wider">
                      <span>ข้อที่ {currentQuestionIndex + 1} จาก 20</span>
                      <span className="px-2 py-0.5 bg-slate-950 rounded border border-slate-800">
                        คะแนนรวม: {playerScore + aiScore}
                      </span>
                    </div>

                    <h4 className="font-bold text-xs text-slate-100 leading-relaxed">
                      {QUIZ_QUESTIONS[currentQuestionIndex].question}
                    </h4>

                    {/* Options */}
                    <div className="space-y-2 pt-2">
                      {QUIZ_QUESTIONS[currentQuestionIndex].options.map((opt, oIdx) => {
                        const isCorrect = oIdx === QUIZ_QUESTIONS[currentQuestionIndex].answer;
                        const isSelected = oIdx === selectedOption;
                        let btnStyle = "bg-slate-950 border-slate-800 hover:border-slate-700 text-slate-300";

                        if (quizPhase === 'reveal') {
                          if (isCorrect) {
                            btnStyle = "bg-emerald-950/80 border-emerald-500 text-emerald-300";
                          } else if (isSelected) {
                            btnStyle = "bg-red-950/80 border-red-500 text-red-300";
                          } else {
                            btnStyle = "bg-slate-950/40 border-slate-900 text-slate-600";
                          }
                        }

                        return (
                          <button
                            key={oIdx}
                            disabled={quizPhase !== 'playing'}
                            onClick={() => handleOptionSelect(oIdx)}
                            className={`w-full p-3 rounded-lg text-left text-xs transition-all border flex items-start gap-2 ${btnStyle}`}
                          >
                            <span className="font-mono text-slate-500 text-[10px] mt-0.5">[{oIdx + 1}]</span>
                            <span className="flex-1 leading-normal">{opt}</span>
                          </button>
                        );
                      })}
                    </div>

                    {/* Reveal Phase Feedback / AI Dialogue */}
                    {quizPhase === 'reveal' && (
                      <div className="bg-slate-950 border border-slate-800 p-2.5 rounded-lg space-y-1.5">
                        <div className="flex items-center gap-1.5 text-xs font-bold">
                          <span>🤖</span>
                          <span className="text-purple-400">
                            {selectedOption === QUIZ_QUESTIONS[currentQuestionIndex].answer 
                              ? "ดาบแหลม: ชิส! เก่งไม่เบานี่หว่า ได้ไปหนึ่งแต้ม" 
                              : selectedOption === null 
                                ? "ดาบแหลม: ลังเลเกินไปแล้ว! ชักช้าหมดสิทธิ์ ดาบแหลมกินแต้มฟรี" 
                                : "ดาบแหลม: ฮั่นแน่! ตอบผิดซะงั้น ผมขอแต้มนี้ละกันนะ"}
                          </span>
                        </div>
                        <p className="text-[10px] text-slate-400 leading-normal pl-5">
                          <strong>เฉลยพฤติการณ์:</strong> {QUIZ_QUESTIONS[currentQuestionIndex].rationale}
                        </p>
                      </div>
                    )}
                  </section>
                </div>
              )}

              {/* Summary View Screen */}
              {quizPhase === 'summary' && (
                <section className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/60 shadow-lg text-center space-y-4">
                  <div className="p-3 bg-blue-900/20 rounded-2xl w-fit mx-auto border border-blue-500/30">
                    <Sparkles className="w-10 h-10 text-amber-400" />
                  </div>

                  <div>
                    <span className="text-[10px] bg-slate-950 border border-slate-800 px-3 py-1 rounded-full font-mono text-slate-400">
                      ยุทธการเสร็จสิ้น
                    </span>
                    <h3 className="font-bold text-sm text-slate-100 mt-2">สรุปผลการรบทางสติปัญญากับดาบแหลม</h3>
                  </div>

                  {/* Scores Card */}
                  <div className="bg-slate-950 p-4 border border-slate-800 rounded-xl grid grid-cols-2 gap-4">
                    <div className="text-center border-r border-slate-800/80">
                      <span className="text-[10px] text-slate-400 block uppercase">คะแนนของคุณ</span>
                      <strong className="text-2xl text-blue-400 font-mono block mt-1">{playerScore}</strong>
                    </div>
                    <div className="text-center">
                      <span className="text-[10px] text-slate-400 block uppercase">คะแนนดาบแหลม</span>
                      <strong className="text-2xl text-purple-400 font-mono block mt-1">{aiScore}</strong>
                    </div>
                  </div>

                  {/* Declare Winner */}
                  <div className="p-3 bg-slate-900 border border-slate-800 rounded-lg">
                    <h4 className="text-xs font-bold text-slate-300">
                      ผู้ชนะเด็ดขาดในเกมนี้:
                    </h4>
                    <p className="text-base font-black text-amber-400 mt-1">
                      {playerScore > aiScore 
                        ? `🏆 ผู้ชนะคือคุณ: ${quizPlayerName}!` 
                        : playerScore === aiScore 
                          ? "🤝 เสมอกันด้วยฝีมือยุทธวิธีเสมอกัน!" 
                          : "🏆 ดาบแหลม (AI) ชนะ! พยายามใหม่อีกครั้ง"}
                    </p>
                  </div>

                  <button
                    onClick={restartQuiz}
                    className="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-xs font-bold transition-all shadow"
                  >
                    กลับไปท้าทายใหม่
                  </button>
                </section>
              )}

            </div>
          )}

        </main>

        {/* Floating Action Quick SOP Drawer Helper at Bottom */}
        <div className="absolute bottom-0 left-0 right-0 bg-slate-950 border-t border-slate-800 py-2.5 px-4 flex justify-between items-center text-[10px] z-15 backdrop-blur-md">
          <span className="text-slate-400 flex items-center gap-1.5">
            <Shield className="w-3.5 h-3.5 text-blue-400" />
          </span>
          <button 
            onClick={() => setActiveTab('checklist')}
            className="text-blue-400 hover:text-blue-300 font-bold transition-colors flex items-center gap-0.5"
          >
            เปิดตารางเช็คลิสต์ด่วน
            <ChevronRight className="w-3.5 h-3.5" />
          </button>
        </div>

      </div>
    </div>
  );
}


const bootLoader = document.getElementById('boot-loader');
if (bootLoader) bootLoader.remove();

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
