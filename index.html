<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SENTINEL LINE — ระบบฝึกยุทธวิธีชายแดน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#040b1a;
  --navy-900:#071226;
  --navy-800:#0b1c3a;
  --navy-700:#0f2a52;
  --blue-600:#1560c9;
  --blue-500:#2f7fe0;
  --blue-400:#5aa2f0;
  --cyan-glow:#5ee6ff;
  --silver-1:#f4f7fb;
  --silver-2:#c7d2df;
  --silver-3:#8b99ad;
  --amber:#f0b429;
  --green:#22c58b;
  --red:#e5484d;
  --radius:16px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:#000;}
body{
  font-family:'Sarabun','Kanit',sans-serif;
  color:var(--silver-1);
  overflow-x:hidden;
}
.metal{
  background:linear-gradient(180deg,#ffffff 0%,#e4ecf5 22%,#aebdd0 48%,#f4f8fc 55%,#8fa0b8 75%,#dfe8f2 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 1px 0 rgba(0,0,0,.4));
  font-family:'Kanit',sans-serif;
}
#app-frame{
  max-width:460px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  background:
    radial-gradient(1200px 500px at 50% -10%, #163a72 0%, transparent 60%),
    radial-gradient(800px 400px at 110% 10%, #0e2c5c 0%, transparent 55%),
    linear-gradient(180deg,var(--navy-950) 0%, var(--navy-900) 40%, #030814 100%);
  box-shadow:0 0 60px rgba(0,0,0,.6);
  padding-top:var(--safe-top);
  padding-bottom:calc(var(--safe-bottom) + 10px);
}
/* subtle animated grid backdrop */
#app-frame::before{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.10;
  background-image:linear-gradient(rgba(90,162,240,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(90,162,240,.6) 1px,transparent 1px);
  background-size:34px 34px;
  mask-image:radial-gradient(circle at 50% 20%, black, transparent 75%);
}
header.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;
  background:linear-gradient(180deg,rgba(4,11,26,.96),rgba(4,11,26,.85));
  backdrop-filter:blur(6px);
  border-bottom:1px solid rgba(120,160,220,.18);
}
.back-btn{
  width:38px;height:38px;border-radius:12px;flex:0 0 auto;
  background:linear-gradient(145deg,#16294f,#0a1730);
  border:1px solid rgba(140,180,240,.25);
  display:flex;align-items:center;justify-content:center;
  color:var(--silver-1);cursor:pointer;
}
.back-btn svg{width:18px;height:18px;}
.back-btn.hidden{visibility:hidden;}
.topbar h1{
  font-family:'Kanit',sans-serif;font-weight:600;font-size:16px;margin:0;
  letter-spacing:.3px;
  flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
main{padding:16px 16px 40px;position:relative;z-index:1;}
.screen{display:none;animation:fadeSlide .35s ease;}
.screen.active{display:block;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){.screen{animation:none;}}

/* ---------- HOME ---------- */
.hero{
  text-align:center;padding:26px 6px 14px;position:relative;
}
.hero .badge-ring{
  width:96px;height:96px;margin:0 auto 14px;position:relative;
}
.hero .badge-ring svg{width:100%;height:100%;display:block;filter:drop-shadow(0 0 18px rgba(94,230,255,.35));}
.hero .badge-ring .spin{animation:spin 14s linear infinite;transform-origin:50% 50%;}
@keyframes spin{to{transform:rotate(360deg);}}
.hero h1{
  font-size:30px;line-height:1.1;margin:0 0 6px;letter-spacing:1px;font-weight:800;
}
.hero p.sub{
  color:var(--silver-3);font-size:13.5px;margin:0;letter-spacing:.4px;
}
.hero .line{
  width:64px;height:3px;margin:14px auto;border-radius:3px;
  background:linear-gradient(90deg,transparent,var(--cyan-glow),transparent);
}
.menu-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;
}
.mcard{
  background:linear-gradient(160deg,#0e2144 0%, #0a1730 65%, #081226 100%);
  border:1px solid rgba(120,168,235,.22);
  border-radius:var(--radius);
  padding:16px 14px;
  position:relative;overflow:hidden;
  cursor:pointer;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  min-height:132px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.mcard::after{
  content:"";position:absolute;inset:-40% -40% auto auto;width:120px;height:120px;
  background:radial-gradient(circle, rgba(94,230,255,.18), transparent 70%);
  pointer-events:none;
}
.mcard:active{transform:scale(.97);}
.mcard:hover{border-color:rgba(94,230,255,.55); box-shadow:0 8px 24px rgba(15,60,140,.35);}
.mcard .micon{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(150deg,#1e4d94,#0c2650);
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(150,190,240,.3);
  margin-bottom:14px;
}
.mcard .micon svg{width:20px;height:20px;stroke:var(--cyan-glow);}
.mcard h3{
  font-family:'Kanit',sans-serif;font-size:14.5px;margin:0 0 4px;font-weight:600;color:var(--silver-1);
  line-height:1.25;
}
.mcard p{margin:0;font-size:11px;color:var(--silver-3);line-height:1.4;}
.mcard.wide{grid-column:1/-1;flex-direction:row;align-items:center;min-height:auto;padding:14px;gap:12px;}
.mcard.wide .micon{margin-bottom:0;}
.mcard.wide .txt{flex:1;}
.mcard.quiz{
  background:linear-gradient(135deg,#123a1e 0%, #0a1730 60%);
  border-color:rgba(60,220,150,.35);
}
.mcard.quiz .micon{background:linear-gradient(150deg,#1c6b3f,#0c2650);}
.mcard.quiz .micon svg{stroke:var(--green);}

.footnote{
  text-align:center;color:var(--silver-3);font-size:10.5px;margin-top:26px;opacity:.6;letter-spacing:.5px;
}

/* ---------- SECTION CONTENT ---------- */
.intro-card{
  background:linear-gradient(160deg,#0e2144,#081226);
  border:1px solid rgba(120,168,235,.2);
  border-radius:var(--radius);padding:16px;margin-bottom:16px;
}
.intro-card h2{margin:0 0 6px;font-family:'Kanit';font-size:17px;font-weight:600;}
.intro-card p{margin:0;color:var(--silver-2);font-size:13px;line-height:1.55;}

.acc{
  border:1px solid rgba(120,168,235,.2);
  border-radius:14px;overflow:hidden;margin-bottom:10px;
  background:linear-gradient(160deg,#0d1e3c,#081226);
}
.acc-head{
  display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;
  user-select:none;
}
.acc-head .num{
  width:26px;height:26px;border-radius:8px;flex:0 0 auto;
  background:linear-gradient(150deg,#1e4d94,#0c2650);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--cyan-glow);font-family:'Kanit';
}
.acc-head h3{margin:0;font-size:13.5px;font-weight:600;font-family:'Kanit';flex:1;color:var(--silver-1);}
.acc-head .chev{width:16px;height:16px;stroke:var(--silver-3);transition:transform .25s ease;flex:0 0 auto;}
.acc.open .acc-head .chev{transform:rotate(180deg);}
.acc-body{
  max-height:0;overflow:hidden;transition:max-height .3s ease;
}
.acc.open .acc-body{max-height:1200px;}
.acc-inner{padding:0 14px 16px 50px;color:var(--silver-2);font-size:12.8px;line-height:1.65;}
.acc-inner ul{margin:6px 0;padding-left:16px;}
.acc-inner li{margin-bottom:5px;}
.acc-inner .tag{
  display:inline-block;background:rgba(94,230,255,.12);border:1px solid rgba(94,230,255,.3);
  color:var(--cyan-glow);font-size:10.5px;padding:2px 8px;border-radius:20px;margin:2px 4px 2px 0;
}
.acc-inner .warn{
  margin-top:8px;padding:10px 12px;border-radius:10px;
  background:rgba(229,72,77,.1);border:1px solid rgba(229,72,77,.35);color:#ff9a9d;font-size:12px;
}

/* checklist */
.progress-wrap{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.progress-track{flex:1;height:8px;border-radius:6px;background:#0c1c38;overflow:hidden;border:1px solid rgba(120,168,235,.2);}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blue-500),var(--cyan-glow));transition:width .35s ease;}
.progress-pct{font-size:12px;color:var(--silver-2);font-family:'Kanit';min-width:38px;text-align:right;}

.check-group{margin-bottom:18px;}
.check-group h4{
  font-family:'Kanit';font-size:12.5px;color:var(--cyan-glow);text-transform:uppercase;letter-spacing:.6px;
  margin:0 0 8px;display:flex;align-items:center;gap:8px;
}
.check-item{
  display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:12px;
  background:linear-gradient(160deg,#0d1e3c,#081226);border:1px solid rgba(120,168,235,.18);
  margin-bottom:8px;cursor:pointer;transition:border-color .2s,background .2s;
}
.check-item.done{border-color:rgba(34,197,139,.5); background:linear-gradient(160deg,#0f2a24,#081226);}
.check-item .box{
  width:22px;height:22px;border-radius:6px;flex:0 0 auto;margin-top:1px;
  border:1.5px solid rgba(150,190,240,.45);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.check-item.done .box{background:var(--green);border-color:var(--green);}
.check-item .box svg{width:14px;height:14px;stroke:#04160e;opacity:0;transform:scale(.5);transition:all .2s;}
.check-item.done .box svg{opacity:1;transform:scale(1);}
.check-item .txt{font-size:12.8px;line-height:1.5;color:var(--silver-2);}
.check-item.done .txt{color:var(--silver-1);text-decoration:line-through;text-decoration-color:rgba(34,197,139,.5);}
.reset-btn{
  width:100%;padding:12px;border-radius:12px;margin-top:6px;
  background:transparent;border:1px solid rgba(229,72,77,.4);color:#ff9a9d;
  font-family:'Sarabun';font-size:13px;cursor:pointer;
}

  box-shadow:0 0 30px rgba(94,230,255,.35), inset 0 0 20px rgba(255,255,255,.2);
